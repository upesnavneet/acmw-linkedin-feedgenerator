<!-- 
  ============================================================
  ACM-W India LinkedIn Feed Widget
  WordPress Custom HTML Block Embed Code
  
  INSTRUCTIONS:
  1. Replace YOUR_NETLIFY_SITE_URL with your actual Netlify URL
     Example: https://acmw-india-feed.netlify.app
  2. Paste this entire block into a WordPress Custom HTML block
  3. Save and publish
  
  Tested with WordPress 6.x — No plugins required.
  ============================================================
-->

<div id="acmw-feed-root"></div>

<style>
  /* ============================================================
   ACM-W India LinkedIn Feed Widget Styles
   Scoped to #acmw-feed-root to avoid WordPress theme conflicts
   ============================================================ */

  #acmw-feed-root {
    --acmw-blue: #0182AC;
    --acmw-dark: #09357A;
    --acmw-white: #FFFFFF;
    --acmw-gray: #F5F7FA;
    --acmw-border: #E1E8ED;
    --acmw-text: #1A2A3A;
    --acmw-muted: #6B7280;
    --acmw-green: #22C55E;
    --acmw-red: #EF4444;
    font-family: Arial, Helvetica, sans-serif;
    box-sizing: border-box;
  }

  #acmw-feed-root *,
  #acmw-feed-root *::before,
  #acmw-feed-root *::after {
    box-sizing: border-box;
  }

  /* Header */
  .acmw-header {
    background: linear-gradient(135deg, var(--acmw-dark) 0%, var(--acmw-blue) 100%);
    border-radius: 12px 12px 0 0;
    padding: 24px 28px;
    color: var(--acmw-white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .acmw-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .acmw-logo-badge {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Roboto Condensed', Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .acmw-header-title {
    font-family: 'Roboto Condensed', Arial, sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin: 0;
    line-height: 1.2;
  }

  .acmw-header-sub {
    font-size: 0.78rem;
    opacity: 0.8;
    margin-top: 2px;
  }

  .acmw-live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.75rem;
    color: white;
    white-space: nowrap;
  }

  .acmw-live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--acmw-green);
    animation: acmw-pulse 2s ease-in-out infinite;
  }

  @keyframes acmw-pulse {

    0%,
    100% {
      opacity: 1;
      transform: scale(1);
    }

    50% {
      opacity: 0.5;
      transform: scale(0.8);
    }
  }

  /* Feed Container */
  .acmw-feed-wrap {
    background: var(--acmw-gray);
    border-radius: 0 0 12px 12px;
    border: 1px solid var(--acmw-border);
    border-top: none;
    padding: 20px;
  }

  /* Loading State */
  .acmw-loading {
    text-align: center;
    padding: 40px 20px;
  }

  .acmw-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--acmw-border);
    border-top-color: var(--acmw-blue);
    border-radius: 50%;
    animation: acmw-spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes acmw-spin {
    to {
      transform: rotate(360deg);
    }
  }

  .acmw-loading p {
    color: var(--acmw-muted);
    font-size: 0.9rem;
    margin: 0;
  }

  /* Error State */
  .acmw-error {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: var(--acmw-red);
    font-size: 0.9rem;
  }

  .acmw-retry-btn {
    margin-top: 12px;
    background: var(--acmw-blue);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.85rem;
    cursor: pointer;
    display: inline-block;
  }

  .acmw-retry-btn:hover {
    background: var(--acmw-dark);
  }

  /* Posts Grid */
  .acmw-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* Post Card */
  .acmw-card {
    background: var(--acmw-white);
    border-radius: 10px;
    border: 1px solid var(--acmw-border);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
    display: flex;
    flex-direction: column;
    text-decoration: none;
  }

  .acmw-card:hover {
    box-shadow: 0 8px 28px rgba(9, 53, 122, 0.14);
    transform: translateY(-3px);
    text-decoration: none;
  }

  /* Card Image */
  .acmw-card-img {
    width: 100%;
    height: 172px;
    object-fit: cover;
    display: block;
    border-bottom: 1px solid var(--acmw-border);
    background-color: var(--acmw-gray);
  }

  .acmw-card-img-placeholder {
    height: 112px;
    background: linear-gradient(135deg, var(--acmw-dark) 0%, var(--acmw-blue) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--acmw-border);
    position: relative;
    overflow: hidden;
  }

  .acmw-card-img-placeholder::before {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    bottom: -40px;
    right: -20px;
  }

  .acmw-card-img-placeholder-text {
    color: rgba(255, 255, 255, 0.5);
    font-family: 'Roboto Condensed', Arial, sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }

  /* Card Body */
  .acmw-card-body {
    padding: 14px 16px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .acmw-card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .acmw-card-date {
    font-size: 0.73rem;
    color: var(--acmw-muted);
    background: var(--acmw-gray);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--acmw-border);
    line-height: 1.6;
  }

  .acmw-card-source {
    font-size: 0.72rem;
    color: var(--acmw-blue);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .acmw-card-text {
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--acmw-text);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
    margin: 0;
  }

  .acmw-card-footer {
    padding-top: 10px;
    border-top: 1px solid var(--acmw-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .acmw-read-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--acmw-blue);
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    padding: 5px 10px;
    border: 1.5px solid var(--acmw-blue);
    border-radius: 6px;
    transition: all 0.2s ease;
    background: transparent;
  }

  .acmw-read-btn:hover {
    background: var(--acmw-blue);
    color: white;
    text-decoration: none;
  }

  .acmw-linkedin-icon {
    width: 16px;
    height: 16px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* Footer / Credits */
  .acmw-feed-footer {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .acmw-footer-text {
    font-size: 0.75rem;
    color: var(--acmw-muted);
  }

  .acmw-footer-text a {
    color: var(--acmw-blue);
    text-decoration: none;
  }

  .acmw-footer-text a:hover {
    text-decoration: underline;
  }

  .acmw-view-all {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--acmw-blue);
    color: white;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 7px;
    transition: background 0.2s;
  }

  .acmw-view-all:hover {
    background: var(--acmw-dark);
    color: white;
    text-decoration: none;
  }

  /* Empty State */
  .acmw-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--acmw-muted);
  }

  .acmw-empty-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .acmw-header {
      border-radius: 10px 10px 0 0;
      padding: 18px 16px;
    }

    .acmw-feed-wrap {
      padding: 14px;
    }

    .acmw-grid {
      grid-template-columns: 1fr;
    }

    .acmw-header-title {
      font-size: 1rem;
    }
  }

  @media (max-width: 480px) {
    .acmw-live-badge {
      display: none;
    }
  }
</style>

<script>
  (function () {
    'use strict';

    // =========================================================
    // CONFIGURATION — Update this URL after deploying to Netlify
    // =========================================================
    var API_URL = 'https://static-acmw.netlify.app/api/posts';
    // Example: 'https://acmw-india-feed.netlify.app/api/posts'
    // =========================================================

    var LINKEDIN_PAGE = 'https://www.linkedin.com/company/acm-w-india/posts/?feedView=all';
    var MAX_DISPLAY = 6; // Number of cards to show (max 10)
    var root = document.getElementById('acmw-feed-root');

    if (!root) return;

    // Render skeleton
    root.innerHTML = buildShell('<div class="acmw-loading"><div class="acmw-spinner"></div><p>Loading latest posts...</p></div>');

    // Fetch posts
    fetch(API_URL, { method: 'GET', headers: { 'Accept': 'application/json' } })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (posts) {
        renderPosts(Array.isArray(posts) ? posts : []);
      })
      .catch(function (err) {
        renderError(err.message);
      });

    // ---- Build Shell ----
    function buildShell(innerContent) {
      return [
        '<div class="acmw-header">',
        '<div class="acmw-header-left">',
        '<div class="acmw-logo-badge">W</div>',
        '<div>',
        '<div class="acmw-header-title">ACM-W India</div>',
        '<div class="acmw-header-sub">LinkedIn Updates</div>',
        '</div>',
        '</div>',
        '<div class="acmw-live-badge">',
        '<span class="acmw-live-dot"></span>',
        'Auto-updates every 6h',
        '</div>',
        '</div>',
        '<div class="acmw-feed-wrap">',
        innerContent,
        '<div class="acmw-feed-footer">',
        '<span class="acmw-footer-text">Powered by automated scraper</span>',
        '<a href="' + esc(LINKEDIN_PAGE) + '" target="_blank" rel="noopener" class="acmw-view-all">',
        linkedinSVG(),
        ' View all on LinkedIn',
        '</a>',
        '</div>',
        '</div>'
      ].join('');
    }

    // ---- Render Posts ----
    function renderPosts(posts) {
      if (!posts.length) {
        root.innerHTML = buildShell(
          '<div class="acmw-empty">' +
          '<div class="acmw-empty-icon">📭</div>' +
          '<p>No posts available yet. Check back soon!</p>' +
          '</div>'
        );
        return;
      }

      var limited = posts.slice(0, MAX_DISPLAY);
      var cards = limited.map(function (post) { return buildCard(post); }).join('');
      root.innerHTML = buildShell('<div class="acmw-grid">' + cards + '</div>');
    }

    // ---- Build Single Card ----
    function buildCard(post) {
      var url = esc(post.url || LINKEDIN_PAGE);
      var date = post.date ? formatDate(post.date) : '';
      var text = esc(post.text || '');

      var imgHtml = post.image
        ? '<img src="' + esc(post.image) + '" alt="Post image" class="acmw-card-img" ' +
        'loading="lazy" onerror="this.parentNode.removeChild(this)">'
        : '<div class="acmw-card-img-placeholder">' +
        '<span class="acmw-card-img-placeholder-text">ACM-W</span>' +
        '</div>';

      return [
        '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="acmw-card">',
        imgHtml,
        '<div class="acmw-card-body">',
        '<div class="acmw-card-meta">',
        (date ? '<span class="acmw-card-date">' + date + '</span>' : ''),
        '<span class="acmw-card-source">ACM-W India</span>',
        '</div>',
        '<p class="acmw-card-text">' + text + '</p>',
        '<div class="acmw-card-footer">',
        '<span class="acmw-read-btn">',
        linkedinSVG(),
        'Read on LinkedIn',
        '</span>',
        '</div>',
        '</div>',
        '</a>'
      ].join('');
    }

    // ---- Error State ----
    function renderError(msg) {
      root.innerHTML = buildShell(
        '<div class="acmw-error">' +
        '<strong>⚠️ Could not load posts</strong><br>' +
        '<small>' + esc(msg) + '</small><br>' +
        '<button class="acmw-retry-btn" onclick="location.reload()">Retry</button>' +
        '</div>'
      );
    }

    // ---- Helpers ----
    function esc(str) {
      return (str || '').toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (e) { return dateStr; }
    }

    function linkedinSVG() {
      return '<svg class="acmw-linkedin-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
        '<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>' +
        '</svg>';
    }

  })();
</script>
