[build]
  command = "npm install && node scripts/download-chromium.js"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/**", "node_modules/@sparticuz/chromium/**"]

[functions."scrape-posts"]
  schedule = "0 0,6,12,18 * * *"

[[redirects]]
  from = "/api/posts"
  to = "/.netlify/functions/get-posts"
  status = 200
  force = true

[[redirects]]
  from = "/api/trigger-scrape"
  to = "/.netlify/functions/scrape-posts"
  status = 200
  force = true

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    Cache-Control = "no-cache"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    Cache-Control = "no-cache"